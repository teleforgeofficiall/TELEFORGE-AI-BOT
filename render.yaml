services:
  - type: web
    name: teleforge-ai
    env: node
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_API_KEY_1
        sync: false
      - key: GOOGLE_API_KEY_2
        sync: false
      - key: CLOUDFLARE_AI_URL
        sync: false
      - key: CLOUDFLARE_AI_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: PORT
        value: 3000
